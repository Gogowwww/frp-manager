name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Permissions au niveau global du workflow (évite les blocages repo)
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/gogowwww/frp-manager:latest -t ghcr.io/gogowwww/frp-manager:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ghcr.io/gogowwww/frp-manager:latest
          docker push ghcr.io/gogowwww/frp-manager:${{ github.sha }}
