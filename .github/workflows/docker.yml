name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraire la version depuis le tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg PANEL_VERSION=${{ steps.version.outputs.version }} \
            -t ghcr.io/gogowwww/frp-manager:latest \
            -t ghcr.io/gogowwww/frp-manager:${{ steps.version.outputs.version }} \
            -t ghcr.io/gogowwww/frp-manager:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/gogowwww/frp-manager:latest
          docker push ghcr.io/gogowwww/frp-manager:${{ steps.version.outputs.version }}
          docker push ghcr.io/gogowwww/frp-manager:${{ github.sha }}
