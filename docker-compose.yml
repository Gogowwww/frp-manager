services:
  frp-manager:
    # Construction depuis les sources (recommandé — fonctionne avec Portainer → Repository)
    build: .
    # Alternative : image pré-buildée sur GitHub Container Registry (quand disponible)
    # image: ghcr.io/gogowwww/frp-manager:latest
    container_name: frp-manager
    restart: unless-stopped

    # Réseau hôte — le panel écoute directement sur les ports de la machine
    network_mode: host

    # pid: host + privileged permettent à nsenter d'accéder au systemd de l'hôte
    # sans avoir à installer systemd dans le container
    pid: host
    privileged: true

    volumes:
      # ── Données persistantes du panel ──────────────────────────────────
      - /etc/frp-manager:/etc/frp-manager        # Config panel + SSL certs
      - /etc/frp:/etc/frp                          # Configs frps/frpc (TOML)
      - /var/log/frp:/var/log/frp                  # Logs frp
      - /var/lib/frp-manager:/var/lib/frp-manager  # État (versions installées)

      # ── Systemd de l'hôte (via nsenter) ────────────────────────────────
      - /run/systemd:/run/systemd
      - /run/dbus:/run/dbus

      # ── Journaux de l'hôte ─────────────────────────────────────────────
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro

      # ── Binaires frp de l'hôte ─────────────────────────────────────────
      # frp-manager détecte /host/usr/local/bin automatiquement et l'utilise
      # pour lire et installer frps/frpc sur le système hôte
      - /usr/local/bin:/host/usr/local/bin

    environment:
      - FRP_MANAGER_PORT=8765
      # Mode démo (fausses instances, aucune action réelle) :
      # - DEMO_MODE=true
